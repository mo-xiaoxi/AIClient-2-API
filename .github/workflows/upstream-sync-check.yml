name: Upstream Sync Check

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9:00 UTC
  workflow_dispatch:  # Manual trigger

permissions:
  issues: write
  contents: read

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check upstream repos
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/check-upstream.js > /tmp/upstream-report.txt 2>&1 || true
          cat /tmp/upstream-report.txt

          # Check if there are new providers or breaking changes
          if grep -q "ACTION NEEDED" /tmp/upstream-report.txt || grep -q "BREAKING" /tmp/upstream-report.txt; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create issue if changes detected
        if: steps.check.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPORT=$(cat /tmp/upstream-report.txt)
          gh issue create \
            --title "Upstream Changes Detected - $(date +%Y-%m-%d)" \
            --body "## Upstream Sync Report

          \`\`\`
          ${REPORT}
          \`\`\`

          Please review the changes above and consider migrating relevant features.

          Generated by: upstream-sync-check workflow" \
            --label "upstream-sync"

      - name: Commit checkpoint update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet configs/upstream-checkpoint.json 2>/dev/null; then
            echo "No checkpoint changes"
          else
            git add configs/upstream-checkpoint.json
            git commit -m "chore: update upstream sync checkpoint"
            git push
          fi
